
{% load static %}

<div class="sidebar">
    {% if user.is_authenticated %}
        {% if user.role == 'admin' or user.role == 'staff' %}
            <img src="{% static 'images/balloorina.jpg' %}" alt="Balloorina">
            <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'admin_profile' %}" class="{% if request.resolver_match.url_name == 'admin_profile' %}active{% endif %}">Profile</a>
            <a href="{% url 'admin_booking_list' %}" class="{% if request.resolver_match.url_name == 'admin_booking_list' %}active{% endif %}">Bookings</a>
            <a href="{% url 'admin_package_list' %}" class="{% if request.resolver_match.url_name == 'admin_package_list' %}active{% endif %}">Packages</a>
            <a href="{% url 'admin_user_list' %}" class="{% if request.resolver_match.url_name == 'admin_user_list' %}active{% endif %}">Users</a>

            {% if user.role == 'admin' %}
            <li>
                <a href="{% url 'admin_reports' %}" class="{% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">Reports</a>
            </li>
            {% endif %}

            {% if user.role == 'admin' %}
                <a href="{% url 'admin_audit_log' %}" class="{% if request.resolver_match.url_name == 'admin_audit_log' %}active{% endif %}">Audit Log</a>
            {% endif %}
            <hr class="admin-panel-hr">
            <a class="sidebar-logout" href="{% url 'logout' %}">Logout</a>
        {% endif %}
    {% endif %}
</div>
