{% load static %}
<div class="draggable-item" draggable="true" 
     data-type="{{ type }}" 
     data-src="{% static src %}" 
     data-width="{{ width|default:'150' }}" 
     data-height="{{ height|default:'150' }}" 
     title="{{ label }}">
    <div class="item-preview-img-wrapper">
        <img class="item-preview-img" src="{% static src %}" alt="{{ label }}" loading="lazy">
    </div>
    <span class="item-label">{{ label }}</span>
</div>
