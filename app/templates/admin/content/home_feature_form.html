{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_content.css' %}">

<div class="page-header">
    <h1>{{ action }} Feature Card</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_home_content' %}">Home Page</a>
        <span class="separator">/</span>
        <span>{{ action }}</span>
    </div>
</div>

<div class="form-container">
    <form method="POST" class="form-card" id="featureForm" novalidate>
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" id="title"
                    value="{% if feature.title %}{{ feature.title }}{% elif post_data.title %}{{ post_data.title }}{% endif %}"
                    placeholder="e.g. Premium Quality" required>
                <p class="field-error" data-error-for="title"></p>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" id="description" rows="6"
                    placeholder="Enter feature description...">{% if feature.description %}{{ feature.description }}{% elif post_data.description %}{{ post_data.description }}{% endif %}</textarea>
            </div>

            <div class="form-group">
                <label>Icon Class (FontAwesome)</label>
                <input type="text" name="icon_class" id="icon_class"
                    value="{% if feature.icon_class %}{{ feature.icon_class }}{% elif post_data.icon_class %}{{ post_data.icon_class }}{% else %}fas fa-star{% endif %}"
                    placeholder="e.g. fas fa-heart">
                <small class="help-text">Example: <code>fas fa-heart</code>, <code>fas fa-gem</code>, <code>fas fa-calendar-alt</code></small>
            </div>

            <div class="form-group">
                <label>Display Order</label>
                <input type="number" name="display_order" id="display_order"
                    value="{% if feature.display_order %}{{ feature.display_order }}{% elif post_data.display_order %}{{ post_data.display_order }}{% else %}0{% endif %}"
                    placeholder="0">
            </div>

            <div class="form-group checkbox-group">
                <label for="is_active">Status</label>
                <label for="is_active" class="active-toggle-box">
                    <input type="checkbox" name="is_active" id="is_active" {% if feature.is_active or post_data.is_active == 'on' or action == 'Create' %}checked{% endif %}>
                    <span>Active (Show on home page)</span>
                </label>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_home_content' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Feature</button>
        </div>
    </form>
</div>
{% endblock %}
