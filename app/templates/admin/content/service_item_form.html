{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<div class="dash-wrap">
    <div class="dash-head">
        <div>
            <h1>{{ action }} Service</h1>
            <p class="dash-sub">Add or update a service item for the Services page.</p>
        </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="content-form">
        {% csrf_token %}
        
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="title">Service Title</label>
                    <input type="text" name="title" id="title" value="{% if feature.title %}{{ feature.title }}{% elif post_data.title %}{{ post_data.title }}{% endif %}" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="display_order">Display Order</label>
                    <input type="number" name="display_order" id="display_order" value="{% if feature.display_order %}{{ feature.display_order }}{% elif post_data.display_order %}{{ post_data.display_order }}{% else %}0{% endif %}" class="form-control">
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label for="description">Description</label>
                    <textarea name="description" id="description" rows="10" class="form-control" required>{% if feature.description %}{{ feature.description }}{% elif post_data.description %}{{ post_data.description }}{% endif %}</textarea>
                </div>

                <div class="form-group">
                    <label for="image">Service Image</label>
                    {% if feature.image %}
                        <div class="current-img">
                            <img src="{{ feature.image.url }}" alt="{{ feature.title }}" style="max-width: 200px; border-radius: 8px; margin-bottom: 10px;">
                        </div>
                    {% endif %}
                    <input type="file" name="image" id="image" class="form-control">
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="is_active" {% if feature.is_active or action == 'Create' %}checked{% endif %}>
                        Active (Visible on website)
                    </label>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">{% if action == 'Create' %}Create Service{% else %}Update Service{% endif %}</button>
            <a href="{% url 'admin_service_content' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-section {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .form-group label {
        font-size: 0.9rem;
        color: #ccc;
    }
    .form-control {
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 10px 14px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }
    .form-control:focus {
        border-color: #f8bbd0;
        outline: none;
        background: rgba(0, 0, 0, 0.3);
    }
    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ddd;
        font-size: 0.95rem;
        cursor: pointer;
        margin-top: 10px;
    }
    .btn-save {
        background: #f8bbd0;
        color: #000;
        border: none;
        padding: 12px 30px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .btn-save:hover {
        background: #f48fb1;
        transform: translateY(-2px);
    }
    .btn-cancel {
        color: #888;
        text-decoration: none;
        margin-left: 15px;
        font-size: 0.9rem;
    }
    .btn-cancel:hover {
        color: #fff;
    }
</style>
{% endblock %}
