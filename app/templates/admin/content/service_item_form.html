{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_content.css' %}">

<div class="page-header">
    <h1>{{ action }} Service</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_service_content' %}">Service Page</a>
        <span class="separator">/</span>
        <span>{{ action }}</span>
    </div>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card" id="serviceForm" novalidate>
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Service Title</label>
                <input type="text" name="title" id="title"
                    value="{% if feature.title %}{{ feature.title }}{% elif post_data.title %}{{ post_data.title }}{% endif %}"
                    placeholder="e.g. Birthday Party Setup" required>
                <p class="field-error" data-error-for="title"></p>
            </div>

            <div class="form-group">
                <label>Display Order</label>
                <input type="number" name="display_order" id="display_order"
                    value="{% if feature.display_order %}{{ feature.display_order }}{% elif post_data.display_order %}{{ post_data.display_order }}{% else %}0{% endif %}"
                    placeholder="0">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" id="description" rows="8"
                    placeholder="Enter service description..." required>{% if feature.description %}{{ feature.description }}{% elif post_data.description %}{{ post_data.description }}{% endif %}</textarea>
                <p class="field-error" data-error-for="description"></p>
            </div>

            <div class="form-group">
                <label>Service Image</label>
                {% if feature.image %}
                    <input type="hidden" name="remove_image" id="remove_image" value="0">
                    <div class="current-img" id="currentServiceImage">
                        <img src="{{ feature.image.url }}" alt="{{ feature.title }}">
                        <button type="button" class="remove-image-control" id="removeServiceImageBtn" title="Remove image">
                            <span aria-hidden="true">&times;</span>
                            <span class="remove-image-text">Remove image</span>
                        </button>
                    </div>
                {% endif %}
                <input type="file" name="image" id="image">
            </div>

            <div class="form-group checkbox-group">
                <label for="is_active">Status</label>
                <label for="is_active" class="active-toggle-box">
                    <input type="checkbox" name="is_active" id="is_active" {% if feature.is_active or action == 'Create' %}checked{% endif %}>
                    <span>Active (Visible on website)</span>
                </label>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_service_content' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">{% if action == 'Create' %}Create Service{% else %}Update Service{% endif %}</button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const removeInput = document.getElementById('remove_image');
        const currentImage = document.getElementById('currentServiceImage');
        const removeButton = document.getElementById('removeServiceImageBtn');

        if (!removeInput || !currentImage || !removeButton) return;

        removeButton.addEventListener('click', function () {
            removeInput.value = '1';
            currentImage.remove();
        });
    });
</script>
{% endblock %}
