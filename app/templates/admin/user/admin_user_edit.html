{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_user.css' %}">


<div class="page-header">
    <h1>Edit User</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_user_list' %}">Users</a>
        <span class="separator">/</span>
        <span>Edit User</span>
    </div>
</div>

<div class="form-container">
    <form method="post" class="form-card">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ u.first_name }}" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ u.last_name }}" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ u.email }}" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone_number" value="{{ u.phone_number }}" placeholder="09XXXXXXXXX">
            </div>

            <div class="form-group full-width">
                <label>Role</label>
                <select name="role" required>
                    <option value="admin" {% if u.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="staff" {% if u.role == 'staff' %}selected{% endif %}>Staff</option>
                    <option value="customer" {% if u.role == 'customer' %}selected{% endif %}>Customer</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_user_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Changes</button>
        </div>
    </form>
</div>

{% endblock %}
