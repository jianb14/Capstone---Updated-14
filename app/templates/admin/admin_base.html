{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - Balloorina{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Base CSS -->
    <link rel="stylesheet" href="{% static 'css/admin_base.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" onclick="closeMobileSidebar()"></div>

    <!-- Include Navbar/Sidebar -->
    {% include 'components/admin_navbar.html' %}

    <!-- Main Content -->
    <main class="main-content">
        {% include 'components/admin_topbar.html' %}

        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            function toggleMobileSidebar() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                sidebar.classList.add('mobile-open');
                overlay.classList.add('active');
            }

            function closeMobileSidebar() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }

            document.querySelectorAll('.sidebar a').forEach(item => {
                item.addEventListener('click', () => {
                    if (window.innerWidth < 1025) {
                        closeMobileSidebar();
                    }
                });
            });

            window.toggleMobileSidebar = toggleMobileSidebar;
            window.closeMobileSidebar = closeMobileSidebar;

        });
    </script>

    {% block extra_js %}{% endblock %}

    <!-- SweetAlert2 & Global Messages Handler -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 4000,
                timerProgressBar: true,
                background: '#1a1a1a',
                color: '#fff',
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            {% if messages %}
                {% for message in messages %}
                    const messageType = '{{ message.tags|escapejs }}' === 'error' ? 'error' : ('{{ message.tags|escapejs }}' === 'success' ? 'success' : 'info');
                    const messageText = '{{ message|escapejs }}';
                    const isLoginSuccess = messageType === 'success' && messageText.toLowerCase().includes('login successful');
                    Toast.fire({
                        icon: messageType,
                        title: messageText,
                        timer: isLoginSuccess ? 1500 : 4000
                    });
                {% endfor %}
            {% endif %}

            document.addEventListener('click', function (event) {
                const trigger = event.target.closest('a[data-swal-confirm="true"]');
                if (!trigger) return;

                event.preventDefault();

                const title = trigger.getAttribute('data-swal-title') || 'Delete this item?';
                const text = trigger.getAttribute('data-swal-text') || 'This action cannot be undone.';
                const confirmText = trigger.getAttribute('data-swal-confirm-text') || 'Yes, delete it';
                const cancelText = trigger.getAttribute('data-swal-cancel-text') || 'Cancel';
                const href = trigger.getAttribute('href');

                Swal.fire({
                    title: title,
                    text: text,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: confirmText,
                    cancelButtonText: cancelText,
                    reverseButtons: true,
                    focusCancel: true,
                    background: '#131313',
                    color: '#ffffff',
                    confirmButtonColor: '#dc2626',
                    cancelButtonColor: '#374151'
                }).then((result) => {
                    if (result.isConfirmed && href) {
                        window.location.href = href;
                    } else if (result.dismiss === Swal.DismissReason.cancel) {
                        Toast.fire({
                            icon: 'info',
                            title: 'Deletion cancelled',
                            timer: 1600
                        });
                    }
                });
            });
        });
    </script>
</body>

</html>
