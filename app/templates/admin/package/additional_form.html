{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_package.css' %}">

<div class="page-header">
    <h1>{% if additional %}Edit Additional Item{% else %}Create Additional Item{% endif %}</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_package_list' %}">Packages</a>
        <span class="separator">/</span>
        <span>Additional</span>
    </div>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card">

        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" value="{{ additional.name|default:'' }}" required>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" name="price" value="{{ additional.price|default:'' }}" required>
            </div>

            <div class="form-group full-width">
                <label>Image</label>
                <input type="file" name="image">
            </div>

            <div class="form-group full-width">
                <label>Features (One per line)</label>
                <textarea name="features" rows="6">{{ additional.features|default:'' }}</textarea>
            </div>

            <div class="form-group full-width">
                <label>Notes</label>
                <textarea name="notes" rows="4">{{ additional.notes|default:'' }}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_package_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Item</button>
        </div>
    </form>
</div>

{% endblock %}
