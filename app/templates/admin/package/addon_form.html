{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_package.css' %}">

<div class="page-header">
    <h1>{% if addon %}Edit Add-On{% else %}Create Add-On{% endif %}</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_package_list' %}">Packages</a>
        <span class="separator">/</span>
        <span>Add-Ons</span>
    </div>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card">
        {% csrf_token %}

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div class="form-grid">
            <!-- Row 1: Name, Price -->
            <div class="form-group span-3">
                <label>Name</label>
                <input type="text" name="name" value="{{ addon.name|default:'' }}" required
                    placeholder="e.g. Photo Booth">
            </div>

            <div class="form-group span-3">
                <label>Package Price</label>
                <input type="number" step="0.01" name="price" value="{{ addon.price|default:'' }}" required
                    placeholder="0.00">
            </div>

            <!-- Row 2: Image, Solo Price -->
            <div class="form-group span-3">
                <label>Image</label>
                <input type="file" name="image">
            </div>

            <div class="form-group span-3">
                <label>Solo Price (Optional)</label>
                <input type="number" step="0.01" name="solo_price" value="{{ addon.solo_price|default:'' }}"
                    placeholder="0.00">
            </div>

            <!-- Row 3: Features -->
            <div class="form-group span-6">
                <label>Features (One per line)</label>
                <textarea name="features" rows="6"
                    placeholder="List add-on features here...">{{ addon.features|default:'' }}</textarea>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_package_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Add-On</button>
        </div>
    </form>
</div>

{% endblock %}
