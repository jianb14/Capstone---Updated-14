{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_package.css' %}">

<div class="page-header">
    <h1>{% if addon %}Edit Add-On{% else %}Create Add-On{% endif %}</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_package_list' %}">Packages</a>
        <span class="separator">/</span>
        <span>Add-Ons</span>
    </div>
</div>

<div class="form-container package-form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card package-form-card" id="addonForm" novalidate>
        {% csrf_token %}

        <div class="form-grid">
            <!-- Row 1: Name, Price -->
            <div class="form-group span-3">
                <label>Name</label>
                <input type="text" name="name" value="{{ addon.name|default:'' }}"
                    placeholder="e.g. Photo Booth" required>
                <p class="field-error" data-error-for="name"></p>
            </div>

            <div class="form-group span-3">
                <label>Package Price</label>
                <input type="number" step="0.01" name="price" value="{{ addon.price|default:'' }}"
                    placeholder="0.00" required>
                <p class="field-error" data-error-for="price"></p>
            </div>

            <!-- Row 2: Solo Price -->
            <div class="form-group span-3">
                <label>Solo Price</label>
                <input type="number" step="0.01" name="solo_price" value="{{ addon.solo_price|default:'' }}"
                    placeholder="0.00" required>
                <p class="field-error" data-error-for="solo_price"></p>
            </div>

            <!-- Row 3: Inclusions -->
            <div class="form-group span-6">
                <label>Inclusions (One per line)</label>
                <textarea name="features" rows="6"
                    placeholder="List add-on inclusions here..." required>{{ addon.features|default:'' }}</textarea>
                <p class="field-error" data-error-for="features"></p>
            </div>

            <!-- Row 4: Image (always at bottom) -->
            <div class="form-group span-6">
                <label>Image</label>
                <input type="file" name="image">
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_package_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Add-On</button>
        </div>
    </form>
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("addonForm");
        if (!form) return;

        const name = form.querySelector('input[name="name"]');
        const price = form.querySelector('input[name="price"]');
        const soloPrice = form.querySelector('input[name="solo_price"]');
        const features = form.querySelector('textarea[name="features"]');

        const setFieldError = (fieldName, message) => {
            const input = form.querySelector(`[name="${fieldName}"]`);
            const group = input ? input.closest('.form-group') : null;
            if (!group) return;
            group.classList.add('has-error');
            const error = group.querySelector(`[data-error-for="${fieldName}"]`);
            if (error) {
                error.textContent = message;
            }
        };

        const clearFieldError = (fieldName) => {
            const input = form.querySelector(`[name="${fieldName}"]`);
            const group = input ? input.closest('.form-group') : null;
            if (!group) return;
            group.classList.remove('has-error');
            const error = group.querySelector(`[data-error-for="${fieldName}"]`);
            if (error) {
                error.textContent = '';
            }
        };

        const requiredFields = [
            { name: 'name', message: 'Name is required*' },
            { name: 'price', message: 'Package price is required*' },
            { name: 'solo_price', message: 'Solo price is required*' },
            { name: 'features', message: 'Inclusions are required*' }
        ];

        if (name) {
            name.addEventListener('input', () => {
                if (name.value.trim()) clearFieldError('name');
            });
        }

        if (price) {
            price.addEventListener('input', () => {
                if (price.value.trim() !== '') clearFieldError('price');
            });
        }

        if (soloPrice) {
            soloPrice.addEventListener('input', () => {
                if (soloPrice.value.trim() !== '') clearFieldError('solo_price');
            });
        }

        if (features) {
            features.addEventListener('input', () => {
                if (features.value.trim()) clearFieldError('features');
            });
        }

        form.addEventListener("submit", function (event) {
            let firstInvalidField = null;

            requiredFields.forEach(field => {
                const input = form.querySelector(`[name="${field.name}"]`);
                const value = input ? (input.value || '').trim() : '';
                if (!value) {
                    setFieldError(field.name, field.message);
                    if (!firstInvalidField) {
                        firstInvalidField = input;
                    }
                    return;
                }
                clearFieldError(field.name);
            });

            if (firstInvalidField) {
                event.preventDefault();
                firstInvalidField.focus();
            }
        });
    });
</script>
{% endblock %}
