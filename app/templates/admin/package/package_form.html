{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_package.css' %}">

<div class="page-header">
    <h1>{% if package %}Edit Package{% else %}Create Package{% endif %}</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_package_list' %}">Packages</a>
        <span class="separator">/</span>
        <span>{% if package %}Edit{% else %}Create{% endif %}</span>
    </div>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card">
        {% csrf_token %}
        
        <div class="form-grid">
            <!-- Basic Info -->
            <div class="form-group">
                <label>Package Name</label>
                <input type="text" name="name" value="{{ package.name|default:'' }}" required placeholder="e.g. Grand Wedding">
            </div>

            <div class="form-group">
                <label>Price (PHP)</label>
                <input type="number" step="0.01" name="price" value="{{ package.price|default:'' }}" required placeholder="0.00">
            </div>

            <div class="form-group full-width">
                <label>Package Image</label>
                <input type="file" name="image">
            </div>

            <div class="form-group full-width">
                <label>Features (One per line)</label>
                <textarea name="features" rows="5" placeholder="List features here...">{{ package.features|default:'' }}</textarea>
            </div>

            <div class="form-group full-width">
                <label>Additional Notes</label>
                <textarea name="notes" rows="3" placeholder="Any extra info...">{{ package.notes|default:'' }}</textarea>
            </div>

            <!-- Service Info Divider -->
            <div class="section-divider"></div>
            <h3 class="section-title">Service Details</h3>

            <div class="form-group full-width">
                <label>Service Charge (PHP)</label>
                <input type="number" step="0.01" name="service_charge" value="{{ package.service_charge|default:'0' }}">
            </div>

            <div class="form-group full-width">
                <label>Service Features (One per line)</label>
                <textarea name="service_features" rows="4" placeholder="List service inclusions...">{{ package.service_features|default:'' }}</textarea>
            </div>

            <div class="form-group full-width">
                <label>Additional Message</label>
                <textarea name="service_notes" rows="3">{{ package.service_notes|default:'' }}</textarea>
            </div>

            <div class="form-group full-width checkbox-group">
                <input type="checkbox" name="is_featured" id="is_featured" {% if package.is_featured %}checked{% endif %}>
                <label for="is_featured">Mark as "Most Popular" (Featured)</label>
            </div>
        </div>

        <div class="form-actions">
            <a href="{% url 'admin_package_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Package</button>
        </div>
    </form>
</div>

{% endblock %}
