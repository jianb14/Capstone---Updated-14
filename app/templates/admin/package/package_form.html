{% extends 'admin/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_package.css' %}">

<div class="page-header">
    <h1>{% if package %}Edit Package{% else %}Create Package{% endif %}</h1>
    <div class="breadcrumb">
        <a href="{% url 'admin_package_list' %}">Packages</a>
        <span class="separator">/</span>
        <span>{% if package %}Edit{% else %}Create{% endif %}</span>
    </div>
</div>

<div class="form-container package-form-container">
    <form method="POST" enctype="multipart/form-data" class="form-card package-form-card" id="packageForm" novalidate>
        {% csrf_token %}

        <div class="form-grid">
            <!-- Row 1: Package Name, Price -->
            <div class="form-group span-2">
                <label>Package Name</label>
                <input type="text" name="name" value="{{ package.name|default:'' }}"
                    placeholder="e.g. Grand Wedding" required>
                <p class="field-error" data-error-for="name"></p>
            </div>

            <div class="form-group span-2">
                <label>Price (PHP)</label>
                <input type="number" step="0.01" name="price" value="{{ package.price|default:'' }}"
                    placeholder="0.00" required>
                <p class="field-error" data-error-for="price"></p>
            </div>

            <!-- Row 2: Inclusions, Additional Notes -->
            <div class="form-group span-3">
                <label>Inclusions (One per line)</label>
                <textarea name="features" rows="8"
                    placeholder="List inclusions here..." required>{{ package.features|default:'' }}</textarea>
                <p class="field-error" data-error-for="features"></p>
            </div>

            <div class="form-group span-3">
                <label>Additional Notes</label>
                <textarea name="notes" rows="8"
                    placeholder="Any extra info...">{{ package.notes|default:'' }}</textarea>
            </div>

            <!-- Row 4: Package Image (always at bottom) -->
            <div class="form-group span-6">
                <label>Package Image</label>
                <input type="file" name="image">
            </div>

            <!-- Row 3: Featured Toggle -->
            <div class="form-group span-6 featured-toggle-group">
                <label for="is_featured">Status</label>
                <label for="is_featured" class="active-toggle-box image-active-row package-featured-toggle">
                    <input type="checkbox" name="is_featured" id="is_featured" {% if package.is_featured %}checked{%endif%}>
                    <span>Mark as "Most Popular" (Featured)</span>
                </label>
            </div>

        </div>

        <div class="form-actions">
            <a href="{% url 'admin_package_list' %}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Package</button>
        </div>
    </form>
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("packageForm");
        if (!form) return;

        const name = form.querySelector('input[name="name"]');
        const price = form.querySelector('input[name="price"]');
        const features = form.querySelector('textarea[name="features"]');

        const setFieldError = (fieldName, message) => {
            const input = form.querySelector(`[name="${fieldName}"]`);
            const group = input ? input.closest('.form-group') : null;
            if (!group) return;
            group.classList.add('has-error');
            const error = group.querySelector(`[data-error-for="${fieldName}"]`);
            if (error) {
                error.textContent = message;
            }
        };

        const clearFieldError = (fieldName) => {
            const input = form.querySelector(`[name="${fieldName}"]`);
            const group = input ? input.closest('.form-group') : null;
            if (!group) return;
            group.classList.remove('has-error');
            const error = group.querySelector(`[data-error-for="${fieldName}"]`);
            if (error) {
                error.textContent = '';
            }
        };

        const requiredFields = [
            { name: 'name', message: 'Package name is required*' },
            { name: 'price', message: 'Package price is required*' },
            { name: 'features', message: 'Inclusions are required*' }
        ];

        if (name) {
            name.addEventListener('input', () => {
                if (name.value.trim()) clearFieldError('name');
            });
        }

        if (price) {
            price.addEventListener('input', () => {
                if (price.value.trim() !== '') clearFieldError('price');
            });
        }

        if (features) {
            features.addEventListener('input', () => {
                if (features.value.trim()) clearFieldError('features');
            });
        }

        form.addEventListener("submit", function (event) {
            let firstInvalidField = null;

            requiredFields.forEach(field => {
                const input = form.querySelector(`[name="${field.name}"]`);
                const value = input ? (input.value || '').trim() : '';
                if (!value) {
                    setFieldError(field.name, field.message);
                    if (!firstInvalidField) {
                        firstInvalidField = input;
                    }
                    return;
                }
                clearFieldError(field.name);
            });

            if (firstInvalidField) {
                event.preventDefault();
                firstInvalidField.focus();
            }
        });
    });
</script>
{% endblock %}
