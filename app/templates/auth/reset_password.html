{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="body">
    <div class="auth-container">
        <div class="logo-container">
            <img src="{% static 'images/BalloorinaLogo1.png' %}" alt="Balloorina Logo">
        </div>

        {% if is_valid_link %}
        <p class="info-text">Set your new password below.</p>
        <form method="post" id="resetPasswordForm" novalidate>
            {% csrf_token %}
            <div class="field-group">
                <label class="input-label" for="password">New Password</label>
                <div class="password-container">
                    <input type="password" class="pass-input" id="password" name="password" placeholder="Create a new password (at least 8 characters)" data-label="New Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <img class="pass-icon" src="{% static 'images/eye-view.png' %}" alt="eye">
                    </button>
                </div>
                <small class="field-error"></small>
            </div>
            <div class="field-group">
                <label class="input-label" for="confirm_password">Confirm New Password</label>
                <div class="password-container">
                    <input type="password" class="pass-input" id="confirm_password" name="confirm_password" placeholder="Re-enter your new password" data-label="Confirm New Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">
                        <img class="pass-icon" src="{% static 'images/eye-view.png' %}" alt="eye">
                    </button>
                </div>
                <small class="field-error"></small>
            </div>
            <button type="submit">Update Password</button>
        </form>
        {% else %}
        <p class="info-text">This reset link is invalid or already expired.</p>
        <p class="bottom-text">
            <a href="{% url 'forgot_password' %}">Request a new reset link</a>
        </p>
        {% endif %}

        <p class="bottom-text">
            <a href="{% url 'login' %}">Back to Login</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function togglePassword(fieldId) {
    const passwordField = document.getElementById(fieldId);
    const toggleButton = passwordField.nextElementSibling;
    const icon = toggleButton.querySelector('img');

    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        icon.src = "{% static 'images/eye-hide.png' %}";
    } else {
        passwordField.type = 'password';
        icon.src = "{% static 'images/eye-view.png' %}";
    }
}

document.addEventListener("DOMContentLoaded", function() {
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3200,
        timerProgressBar: true,
        background: '#1a1a1a',
        color: '#fff'
    });

    const resetPasswordForm = document.getElementById('resetPasswordForm');
    if (resetPasswordForm) {
        const requiredInputs = Array.from(resetPasswordForm.querySelectorAll('input[required]'));
        let submitAttempted = false;

        const getFieldGroup = (input) => input.closest('.field-group');

        const setFieldError = (input, message) => {
            const fieldGroup = getFieldGroup(input);
            if (!fieldGroup) return;

            const errorElement = fieldGroup.querySelector('.field-error');
            if (!errorElement) return;

            if (message) {
                fieldGroup.classList.add('has-error');
                errorElement.textContent = message;
            } else {
                fieldGroup.classList.remove('has-error');
                errorElement.textContent = '';
            }
        };

        const getValidationMessage = (input) => {
            if (input.validity.valueMissing) {
                return `${input.dataset.label || input.name} is required*`;
            }
            return '';
        };

        const validateField = (input) => {
            if (!input.checkValidity()) {
                setFieldError(input, getValidationMessage(input) || input.validationMessage);
                return false;
            }
            setFieldError(input, '');
            return true;
        };

        const resetValidationUI = () => {
            requiredInputs.forEach((input) => setFieldError(input, ''));
        };

        resetValidationUI();

        resetPasswordForm.addEventListener('submit', function(e) {
            submitAttempted = true;
            let isFormValid = true;
            let firstInvalidInput = null;

            requiredInputs.forEach((input) => {
                const valid = validateField(input);
                if (!valid && !firstInvalidInput) {
                    firstInvalidInput = input;
                }
                isFormValid = isFormValid && valid;
            });

            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirm_password');
            if (password && confirmPassword && password.value !== confirmPassword.value) {
                isFormValid = false;
                setFieldError(confirmPassword, 'Passwords do not match.');
                if (!firstInvalidInput) {
                    firstInvalidInput = confirmPassword;
                }
            } else if (confirmPassword && confirmPassword.value) {
                setFieldError(confirmPassword, '');
            }

            if (!isFormValid) {
                e.preventDefault();
                if (firstInvalidInput) {
                    firstInvalidInput.focus();
                }
            }
        });

        requiredInputs.forEach((input) => {
            input.addEventListener('blur', () => {
                if (submitAttempted) {
                    validateField(input);
                }
            });

            input.addEventListener('input', () => {
                if (submitAttempted) {
                    validateField(input);
                }
            });
        });
    }

    {% if messages %}
        {% for message in messages %}
            Toast.fire({
                icon: '{{ message.tags|escapejs }}' === 'error' ? 'error' : ('{{ message.tags|escapejs }}' === 'success' ? 'success' : 'info'),
                title: '{{ message|escapejs }}'
            });
        {% endfor %}
    {% endif %}
});
</script>
{% endblock %}
