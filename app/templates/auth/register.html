{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="body">
    <div class="auth-container">

        <div class="logo-container">
            <img src="{% static 'images/BalloorinaLogo1.png' %}" alt="Balloorina Logo">
        </div>

        <p class="info-text">Please enter the information.</p>

        <form method="post" id="registerForm" novalidate>
        {% csrf_token %}
        
            <!-- Name Fields (Two Column) -->
            <div class="name-row">
                <div class="field-group">
                    <label class="input-label" for="first_name">First Name <span style="color: red;">*</span></label>
                    <input type="text" id="first_name" name="first_name" placeholder="Enter your first name" data-label="First Name" required>
                    <small class="field-error"></small>
                </div>
                <div class="field-group">
                    <label class="input-label" for="last_name">Last Name <span style="color: red;">*</span></label>
                    <input type="text" id="last_name" name="last_name" placeholder="Enter your last name" data-label="Last Name" required>
                    <small class="field-error"></small>
                </div>
            </div>

            <!-- Username -->
            <div class="field-group">
                <label class="input-label" for="username">Username <span style="color: red;">*</span></label>
                <input type="text" id="username" name="username" placeholder="Choose a username (e.g., juan_dc)" data-label="Username" required>
                <small class="field-error"></small>
            </div>
            
            <!-- Email -->
            <div class="field-group">
                <label class="input-label" for="email">Gmail Address <span style="color: red;">*</span></label>
                <input type="email" name="email" id="email" placeholder="Enter your Gmail address (e.g., juan@gmail.com)" data-label="Gmail Address" pattern="[A-Za-z0-9._%+-]+@gmail\.com" title="Please use a valid Gmail address." required>
                <small class="field-error"></small>
            </div>
            
            <!-- Phone Number -->
            <div class="field-group">
                <label class="input-label" for="phone">Phone Number <span style="color: red;">*</span></label>
                <input type="tel" name="phone" id="phone" placeholder="Enter your phone number (e.g., 09123456789)" data-label="Phone Number" required>
                <small class="field-error"></small>
            </div>
            
            <!-- Password with Show/Hide Toggle -->
            <div class="field-group">
                <label class="input-label" for="password">Password <span style="color: red;">*</span></label>
                <div class="password-container">
                    <input type="password" class="pass-input" id="password" name="password" placeholder="Create a password (at least 8 characters)" data-label="Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <img class="pass-icon" src="{% static 'images/eye-view.png' %}" alt="eye">
                    </button>
                </div>
                <div class="password-requirements" id="passwordRequirements" aria-live="polite">
                    <p class="password-requirements-title">Password must have:</p>
                    <ul class="password-requirements-list">
                        <li id="rule-length" class="password-rule"><span class="password-rule-icon" aria-hidden="true"></span><span>At least 8 characters</span></li>
                        <li id="rule-uppercase" class="password-rule"><span class="password-rule-icon" aria-hidden="true"></span><span>At least 1 uppercase letter</span></li>
                        <li id="rule-number" class="password-rule"><span class="password-rule-icon" aria-hidden="true"></span><span>At least 1 number</span></li>
                        <li id="rule-special" class="password-rule"><span class="password-rule-icon" aria-hidden="true"></span><span>At least 1 special character</span></li>
                    </ul>
                </div>
                <small class="field-error"></small>
            </div>

            <!-- Confirm Password with Show/Hide Toggle -->
            <div class="field-group">
                <label class="input-label" for="confirm_password">Confirm Password <span style="color: red;">*</span></label>
                <div class="password-container">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password to confirm" data-label="Confirm Password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">
                        <img class="pass-icon" src="{% static 'images/eye-view.png' %}" alt="eye">
                    </button>
                </div>
                <small class="field-error"></small>
            </div>

            <div class="terms-check-wrap">
                <label for="terms_ack" class="terms-check-label">
                    <input type="checkbox" id="terms_ack" name="terms_ack" required>
                    <span>
                        I agree to the
                        <a href="{% url 'terms_conditions' %}" target="_blank" rel="noopener">Terms &amp; Conditions</a>
                        and
                        <a href="{% url 'data_privacy' %}" target="_blank" rel="noopener">Privacy Policy</a>.
                    </span>
                </label>
                <small class="field-error" id="terms-error"></small>
            </div>

            <!-- Register Button -->
            <button type="submit" id="registerSubmitBtn" disabled>Register</button>
        </form>

        <p class="bottom-text">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function togglePassword(fieldId) {
        const passwordField = document.getElementById(fieldId);
        const toggleButton = passwordField.nextElementSibling;
        const icon = toggleButton.querySelector('img');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            icon.src = "{% static 'images/eye-hide.png' %}";
        } else {
            passwordField.type = 'password';
            icon.src = "{% static 'images/eye-view.png' %}";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 4000,
            timerProgressBar: true,
            background: '#1a1a1a',
            color: '#fff',
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        const registerForm = document.getElementById('registerForm');
        if (registerForm) {
            const requiredInputs = Array.from(registerForm.querySelectorAll('input[required]'));
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm_password');
            const termsCheckbox = document.getElementById('terms_ack');
            const registerSubmitBtn = document.getElementById('registerSubmitBtn');
            const passwordRules = {
                length: document.getElementById('rule-length'),
                uppercase: document.getElementById('rule-uppercase'),
                number: document.getElementById('rule-number'),
                special: document.getElementById('rule-special')
            };
            let submitAttempted = false;

            const getFieldGroup = (input) => input.closest('.field-group');

            const setFieldError = (input, message) => {
                const fieldGroup = getFieldGroup(input);
                if (!fieldGroup) return;

                const errorElement = fieldGroup.querySelector('.field-error');
                if (!errorElement) return;

                if (message) {
                    fieldGroup.classList.add('has-error');
                    errorElement.textContent = message;
                } else {
                    fieldGroup.classList.remove('has-error');
                    errorElement.textContent = '';
                }
            };

            const getValidationMessage = (input) => {
                if (input.validity.valueMissing) {
                    return `${input.dataset.label || input.name} is required*`;
                }
                if (input.type === 'email' && input.validity.typeMismatch) {
                    return "Please enter a valid email address (must include '@').";
                }
                if (input.type === 'email' && input.validity.patternMismatch) {
                    return 'Please use a valid Gmail address (example: yourname@gmail.com).';
                }
                return '';
            };

            const getPasswordRuleState = (value) => ({
                length: value.length >= 8,
                uppercase: /[A-Z]/.test(value),
                number: /\d/.test(value),
                special: /[^A-Za-z0-9]/.test(value)
            });

            const syncPasswordChecklist = () => {
                if (!passwordInput) return getPasswordRuleState('');

                const ruleState = getPasswordRuleState(passwordInput.value);
                Object.entries(passwordRules).forEach(([key, element]) => {
                    if (!element) return;
                    element.classList.toggle('is-valid', ruleState[key]);
                });

                return ruleState;
            };

            const validatePasswordRules = () => {
                if (!passwordInput) return true;

                const ruleState = syncPasswordChecklist();
                const isPasswordValid = Object.values(ruleState).every(Boolean);

                if (!isPasswordValid) {
                    setFieldError(
                        passwordInput,
                        'Password must be at least 8 characters and include 1 uppercase letter, 1 number, and 1 special character.'
                    );
                    return false;
                }

                setFieldError(passwordInput, '');
                return true;
            };

            const validateField = (input) => {
                if (!input.checkValidity()) {
                    setFieldError(input, getValidationMessage(input) || input.validationMessage);
                    return false;
                }
                setFieldError(input, '');
                return true;
            };

            const resetValidationUI = () => {
                requiredInputs.forEach((input) => setFieldError(input, ''));
                syncPasswordChecklist();
            };

            const syncSubmitState = () => {
                if (!registerSubmitBtn || !termsCheckbox) return;
                registerSubmitBtn.disabled = !termsCheckbox.checked;
            };

            resetValidationUI();
            syncSubmitState();

            registerForm.addEventListener('submit', function(e) {
                submitAttempted = true;
                let isFormValid = true;
                let firstInvalidInput = null;

                requiredInputs.forEach((input) => {
                    const valid = validateField(input);
                    if (!valid && !firstInvalidInput) {
                        firstInvalidInput = input;
                    }
                    isFormValid = isFormValid && valid;
                });

                if (passwordInput && !passwordInput.validity.valueMissing) {
                    const passwordRulesValid = validatePasswordRules();
                    if (!passwordRulesValid && !firstInvalidInput) {
                        firstInvalidInput = passwordInput;
                    }
                    isFormValid = isFormValid && passwordRulesValid;
                }

                if (passwordInput && confirmPasswordInput && passwordInput.value !== confirmPasswordInput.value) {
                    isFormValid = false;
                    setFieldError(confirmPasswordInput, 'Passwords do not match.');
                    if (!firstInvalidInput) firstInvalidInput = confirmPasswordInput;
                } else if (confirmPasswordInput && confirmPasswordInput.value) {
                    setFieldError(confirmPasswordInput, '');
                }

                if (termsCheckbox && !termsCheckbox.checked) {
                    isFormValid = false;
                    const termsError = document.getElementById('terms-error');
                    if (termsError) {
                        termsError.textContent = 'You must agree to the Terms & Conditions and Data Privacy Notice.';
                    }
                    if (!firstInvalidInput) firstInvalidInput = termsCheckbox;
                }

                if (!isFormValid) {
                    e.preventDefault();
                    if (firstInvalidInput) {
                        firstInvalidInput.focus();
                    }
                }
            });

            requiredInputs.forEach((input) => {
                input.addEventListener('blur', () => {
                    if (submitAttempted) {
                        validateField(input);
                        if (input === passwordInput && !input.validity.valueMissing) {
                            validatePasswordRules();
                        }
                    }
                });

                input.addEventListener('input', () => {
                    if (input === passwordInput) {
                        syncPasswordChecklist();
                    }

                    if (submitAttempted) {
                        validateField(input);
                        if (input === passwordInput && !input.validity.valueMissing) {
                            validatePasswordRules();
                        }
                        if (
                            input === passwordInput &&
                            confirmPasswordInput &&
                            confirmPasswordInput.value
                        ) {
                            if (passwordInput.value !== confirmPasswordInput.value) {
                                setFieldError(confirmPasswordInput, 'Passwords do not match.');
                            } else {
                                setFieldError(confirmPasswordInput, '');
                            }
                        }
                        if (input === confirmPasswordInput && passwordInput) {
                            if (passwordInput.value !== confirmPasswordInput.value) {
                                setFieldError(confirmPasswordInput, 'Passwords do not match.');
                            } else {
                                setFieldError(confirmPasswordInput, '');
                            }
                        }
                    }
                });
            });

            if (termsCheckbox) {
                termsCheckbox.addEventListener('change', () => {
                    const termsError = document.getElementById('terms-error');
                    if (termsError && termsCheckbox.checked) {
                        termsError.textContent = '';
                    }
                    syncSubmitState();
                });
            }

            syncPasswordChecklist();
        }

        {% if errors %}
            {% for error in errors %}
                Toast.fire({
                    icon: 'error',
                    title: '{{ error|escapejs }}'
                });
            {% endfor %}
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                Toast.fire({
                    icon: '{{ message.tags|escapejs }}' === 'error' ? 'error' : ('{{ message.tags|escapejs }}' === 'success' ? 'success' : 'info'),
                    title: '{{ message|escapejs }}'
                });
            {% endfor %}
        {% endif %}
    });
</script>
{% endblock %}
