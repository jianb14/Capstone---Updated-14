{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="body">
    <div class="auth-container">

        <div class="logo-container">
            <img src="{% static 'images/balloorina.jpg' %}" alt="Balloorina Logo">
        </div>

        <p class="info-text">Please enter the information.</p>

        {% if errors %}
        <div class="error-message">
            <ul class="error-list">
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form method="post">
        {% csrf_token %}
        
            <!-- Name Fields (Two Column) -->
            <div class="name-row">
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="last_name" placeholder="Last Name" required>
            </div>

            <!-- Username -->
            <input type="text" name="username" placeholder="Username" required>
            
            <!-- Email -->
            <input type="email" name="email" placeholder="Email Address" required>
            
            <!-- Phone Number -->
            <input type="tel" name="phone" placeholder="Phone Number">
            
            <!-- Password with Show/Hide Toggle -->
            <div class="password-container">
                <input type="password" class="pass-input" id="password" name="password" placeholder="Password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                    <img class="pass-icon" src="{% static 'images/eye.png' %}" alt="eye">
                </button>
            </div>

            <!-- Confirm Password with Show/Hide Toggle -->
            <div class="password-container">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">
                    <img class="pass-icon" src="{% static 'images/eye.png' %}" alt="eye">
                </button>
            </div>

            <!-- Register Button -->
            <button type="submit">Register</button>
        </form>

        <p class="bottom-text">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>

    </div>
</div>

    <script>
    function togglePassword(fieldId) {
        const passwordField = document.getElementById(fieldId);
        const toggleButton = passwordField.nextElementSibling;
        const icon = toggleButton.querySelector('img');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            icon.src = "{% static 'images/closed-eye.png' %}";
        } else {
            passwordField.type = 'password';
            icon.src = "{% static 'images/eye.png' %}";
        }
    }
    </script>

{% endblock %}
