{% load static %}


{% block content %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">

<div class="body">
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="{% static 'images/balloorina.jpg' %}" alt="Balloorina Logo">
        </div>

        <!-- Heading -->

        <!-- Error Message -->
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="post">
            {% csrf_token %}
            
            <!-- Email Input -->
            <input type="email" name="email" placeholder="Email Address" required>
            
            <!-- Password Input with Show/Hide Toggle -->
            <div class="password-container">
                <input type="password" class="pass-input" id="password" name="password" placeholder="Password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                    <img class="pass-icon" src="{% static 'images/eye.png' %}" alt="eye">
                </button>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="remember-container">
                <label>
                    <input type="checkbox" name="remember_me">
                    Remember me
                </label>
            </div>

            <!-- Login Button -->
            <button type="submit">Login</button>
        </form>

        <!-- Register Link -->
        <p class="bottom-text">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>


<!-- Password Toggle Script -->
<script>
function togglePassword(fieldId) {
    const passwordField = document.getElementById(fieldId);
    const toggleButton = passwordField.nextElementSibling;
    const icon = toggleButton.querySelector('img');
    
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        icon.src = "{% static 'images/closed-eye.png' %}";
    } else {
        passwordField.type = 'password';
        icon.src = "{% static 'images/eye.png' %}";
    }
}
</script>
{% endblock %}
