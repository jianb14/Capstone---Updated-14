<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">

<!-- Drop Shadow -->
<ellipse cx="60" cy="105" rx="30" ry="8" fill="#cbd5e1" opacity="0.6"/>
<!-- Cup Wrapper Front -->
<polygon points="35,100 85,100 95,60 25,60" fill="#fde68a" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Wrapper Folds -->
<path d="M 45,100 L 40,60" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
<path d="M 60,100 L 60,60" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
<path d="M 75,100 L 80,60" stroke="#eab308" stroke-width="2" stroke-linecap="round"/>
<!-- Frosting (3D swirls) -->
<path d="M 20,60 Q 60,40 100,60" fill="#fbcfe8" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<path d="M 30,50 Q 60,20 90,50" fill="#f9a8d4" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<path d="M 45,35 Q 60,10 75,35" fill="#f472b6" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<!-- Cherry -->
<circle cx="60" cy="20" r="8" fill="#ef4444" stroke="#1e293b" stroke-width="3"/>
<path d="M 62,15 Q 75,5 80,15" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<!-- Sprinkles -->
<rect x="35" y="45" width="6" height="3" rx="1.5" fill="#3b82f6" transform="rotate(-20 38 46)"/>
<rect x="75" y="40" width="6" height="3" rx="1.5" fill="#fbbf24" transform="rotate(30 78 41)"/>
<rect x="50" y="30" width="6" height="3" rx="1.5" fill="#22c55e" transform="rotate(-45 53 31)"/>

</svg>