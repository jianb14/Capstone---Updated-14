<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">

<!-- Drop Shadow -->
<polygon points="30,120 110,120 130,130 50,130" fill="#cbd5e1" opacity="0.6"/>
<!-- Left Box Detail (Isometric) -->
<polygon points="20,70 50,55 80,70 50,85" fill="#fdba74" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="20,70 50,85 50,115 20,100" fill="#fb923c" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="80,70 50,85 50,115 80,100" fill="#ea580c" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Left Box Lid -->
<polygon points="15,65 50,45 85,65 50,85" fill="#fb923c" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="15,65 50,85 50,95 15,75" fill="#f97316" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="85,65 50,85 50,95 85,75" fill="#c2410c" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Left Box Ribbon -->
<polygon points="45,48 55,42 60,78 50,85" fill="#fff" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="45,108 55,103 55,83 45,88" fill="#fff" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Left Box Bow -->
<path d="M 50,45 Q 40,30 30,40 Q 40,55 50,45" fill="#fef08a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<path d="M 50,45 Q 60,30 70,40 Q 60,55 50,45" fill="#fef08a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

<!-- Right Box Detail (Isometric) -->
<polygon points="70,90 100,75 130,90 100,105" fill="#d8b4fe" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="70,90 100,105 100,125 70,110" fill="#c084fc" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="130,90 100,105 100,125 130,110" fill="#9333ea" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Right Box Lid -->
<polygon points="65,85 100,65 135,85 100,105" fill="#c084fc" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="65,85 100,105 100,115 65,95" fill="#a855f7" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="135,85 100,105 100,115 135,95" fill="#7e22ce" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Right Box Ribbon -->
<polygon points="95,68 105,62 110,98 100,105" fill="#fff" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="95,123 105,118 105,103 95,108" fill="#fff" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Right Box Bow -->
<path d="M 100,65 Q 90,50 80,60 Q 90,75 100,65" fill="#fef08a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<path d="M 100,65 Q 110,50 120,60 Q 110,75 100,65" fill="#fef08a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

</svg>