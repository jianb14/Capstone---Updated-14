<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100">

<!-- Drop Shadows -->
<ellipse cx="40" cy="90" rx="20" ry="5" fill="#cbd5e1" opacity="0.6"/>
<ellipse cx="100" cy="90" rx="20" ry="5" fill="#cbd5e1" opacity="0.6"/>

<!-- Moustache Stick -->
<path d="M 40,85 L 20,45" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<!-- Moustache 3D -->
<path d="M 20,45 C 5,45 5,30 20,40 C 35,30 35,45 20,45" fill="#0f172a" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Highlights -->
<path d="M 12,38 C 15,35 18,36 18,38" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
<path d="M 28,38 C 25,35 22,36 22,38" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

<!-- Lips Stick -->
<path d="M 100,85 L 115,45" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
<!-- Lips 3D -->
<path d="M 115,40 Q 125,30 135,40 Q 125,48 115,40" fill="#ef4444" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<path d="M 115,40 Q 125,45 135,40 Q 125,55 115,40" fill="#dc2626" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Highlights -->
<path d="M 120,38 Q 125,35 130,38" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
<path d="M 122,48 Q 125,50 128,48" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

</svg>