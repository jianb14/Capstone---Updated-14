<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180">

<!-- Drop Shadow -->
<polygon points="30,165 130,150 150,160 50,175" fill="#cbd5e1" opacity="0.6"/>
<!-- Frame Extrusion (Side) -->
<polygon points="120,20 135,30 135,160 120,150" fill="#f59e0b" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Frame Front -->
<polygon points="20,35 120,20 120,150 20,165" fill="#fbbf24" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Inner Frame Cutout (Front) -->
<polygon points="30,45 110,33 110,123 30,135" fill="#fff" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Inner Frame Extrusion (Bottom inner edge) -->
<polygon points="30,135 110,123 112,126 32,138" fill="#d97706" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<!-- Text on frame -->
<text x="70" y="152" text-anchor="middle" font-size="12" font-family="Arial,sans-serif" font-weight="bold" fill="#1e293b" transform="rotate(-8 70 152)">#PARTY</text>

</svg>