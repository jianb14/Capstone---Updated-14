<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">

<!-- Drop Shadow -->
<polygon points="20,110 140,110 150,115 10,115" fill="#cbd5e1" opacity="0.6"/>
<!-- Table -->
<rect x="10" y="70" width="140" height="40" rx="4" fill="#f8fafc" stroke="#1e293b" stroke-width="4"/>
<!-- Jar 1 (Left) -->
<path d="M 25,70 L 25,40 A 10 10 0 0 1 55,40 L 55,70 Z" fill="#bfdbfe" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Candies in Jar 1 -->
<circle cx="35" cy="60" r="4" fill="#60a5fa"/><circle cx="45" cy="55" r="4" fill="#60a5fa"/>
<circle cx="30" cy="50" r="4" fill="#60a5fa"/><circle cx="48" cy="65" r="4" fill="#60a5fa"/>
<!-- Jar 1 Lid -->
<rect x="30" y="25" width="20" height="5" rx="2" fill="#94a3b8" stroke="#1e293b" stroke-width="3"/>
<!-- Jar 2 (Center - Tall) -->
<path d="M 65,70 L 65,30 A 15 15 0 0 1 95,30 L 95,70 Z" fill="#fecdd3" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Candies in Jar 2 -->
<circle cx="75" cy="60" r="5" fill="#fb7185"/><circle cx="85" cy="50" r="5" fill="#fb7185"/>
<circle cx="72" cy="40" r="5" fill="#fb7185"/><circle cx="88" cy="65" r="5" fill="#fb7185"/>
<circle cx="80" cy="35" r="5" fill="#fb7185"/>
<!-- Jar 2 Lid -->
<polygon points="70,25 90,25 85,15 75,15" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Jar 3 (Right - Small) -->
<path d="M 105,70 L 105,50 A 12 12 0 0 1 135,50 L 135,70 Z" fill="#fef08a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Candies in Jar 3 -->
<circle cx="115" cy="60" r="4.5" fill="#facc15"/><circle cx="125" cy="55" r="4.5" fill="#facc15"/>
<circle cx="120" cy="48" r="4.5" fill="#facc15"/>
<!-- Jar 3 Lid -->
<rect x="112" y="32" width="16" height="5" rx="2" fill="#94a3b8" stroke="#1e293b" stroke-width="3"/>

</svg>