<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">

<!-- Drop Shadow -->
<ellipse cx="60" cy="125" rx="40" ry="10" fill="#cbd5e1" opacity="0.6"/>
<!-- Base Isometric -->
<polygon points="20,110 60,95 100,110 60,125" fill="#fde047" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="20,110 60,125 60,135 20,120" fill="#eab308" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="100,110 60,125 60,135 100,120" fill="#d97706" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Stand Pole -->
<rect x="55" y="40" width="10" height="65" fill="#cbd5e1" stroke="#1e293b" stroke-width="4"/>
<!-- Extruded Number #1 (Isometric style) -->
<polygon points="45,45 65,30 85,30 85,85 70,85 70,50 63,50 63,85 48,85" fill="#fbbf24" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="45,45 65,30 60,25 40,40" fill="#fde68a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="65,30 85,30 80,25 60,25" fill="#fde68a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<polygon points="85,30 80,25 80,80 85,85" fill="#d97706" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

</svg>