<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">

<!-- Drop Shadow -->
<ellipse cx="50" cy="105" rx="30" ry="8" fill="#cbd5e1" opacity="0.6"/>
<!-- Hat cone (Isometric) -->
<path d="M 50,20 L 20,95 A 30 10 0 0 0 80,95 Z" fill="#facc15" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Cone Extrusion (Bottom Edge thickness) -->
<path d="M 20,95 A 30 10 0 0 0 80,95 L 80,100 A 30 10 0 0 1 20,100 Z" fill="#eab308" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Pom Pom (Top) -->
<circle cx="50" cy="15" r="10" fill="#ef4444" stroke="#1e293b" stroke-width="3"/>
<!-- Pattern -->
<path d="M 40,45 Q 50,55 60,45" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
<path d="M 30,70 Q 50,85 70,70" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
<circle cx="50" cy="35" r="3" fill="#3b82f6"/>
<circle cx="45" cy="60" r="3" fill="#22c55e"/>
<circle cx="55" cy="65" r="3" fill="#ec4899"/>

</svg>