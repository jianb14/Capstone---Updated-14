<path d="M 30,20 Q 60,60 20,90 T 50,140" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<!-- Ribbon wrap effect -->
<path d="M 50,60 Q 30,80 50,105" fill="none" stroke="#db2777" stroke-width="12" stroke-linecap="round"/>
<path d="M 50,60 Q 30,80 50,105" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

<path d="M 80,10 Q 40,50 90,80 T 60,130" fill="none" stroke="#60a5fa" stroke-width="12" stroke-linecap="round"/>
<path d="M 80,10 Q 40,50 90,80 T 60,130" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<path d="M 60,55 Q 85,75 55,100" fill="none" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
<path d="M 60,55 Q 85,75 55,100" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

</svg>