<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">

<!-- Drop Shadow -->
<polygon points="20,140 180,120 190,130 30,150" fill="#cbd5e1" opacity="0.6"/>
<!-- Poles -->
<line x1="25" y1="80" x2="25" y2="140" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<line x1="90" y1="90" x2="90" y2="150" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<line x1="175" y1="65" x2="175" y2="120" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
<!-- Side flaps -->
<polygon points="20,80 90,95 90,40 20,50" fill="#f1f5f9" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="90,95 180,65 180,25 90,40" fill="#e2e8f0" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Roof -->
<polygon points="20,50 90,40 120,10 50,20" fill="#f8fafc" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="90,40 180,25 150,5 120,10" fill="#f1f5f9" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<line x1="20" y1="50" x2="120" y2="10" stroke="#1e293b" stroke-width="3"/>
<line x1="90" y1="40" x2="150" y2="5" stroke="#1e293b" stroke-width="3"/>
<!-- Pennants -->
<path d="M 20,50 L 25,60 L 30,48" fill="#fbbf24" stroke="#1e293b" stroke-width="2"/>
<path d="M 40,47 L 45,57 L 50,45" fill="#f43f5e" stroke="#1e293b" stroke-width="2"/>
<path d="M 60,44 L 65,54 L 70,42" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>

</svg>