<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">

<!-- Drop Shadow -->
<polygon points="30,130 150,100 180,120 60,150" fill="#cbd5e1" opacity="0.6"/>
<!-- Table Legs -->
<rect x="40" y="70" width="8" height="60" fill="#fbbf24" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="140" y="55" width="8" height="50" fill="#fbbf24" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="75" y="80" width="8" height="55" fill="#fde047" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="165" y="65" width="8" height="45" fill="#fde047" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Tablecloth Drape/Extrusion -->
<polygon points="20,60 150,30 150,45 20,75" fill="#fef08a" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="150,30 180,50 180,65 150,45" fill="#fde047" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Tabletop Surface -->
<polygon points="20,60 150,30 180,50 50,80" fill="#fef9c3" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Gifts on table -->
<polygon points="60,65 80,60 90,65 70,70" fill="#a855f7" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<polygon points="60,65 70,70 70,80 60,75" fill="#9333ea" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<polygon points="70,70 90,65 90,75 70,80" fill="#7e22ce" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<line x1="75" y1="62.5" x2="75" y2="77.5" stroke="#fef08a" stroke-width="2"/>
<line x1="65" y1="67.5" x2="85" y2="62.5" stroke="#fef08a" stroke-width="2"/>

<polygon points="120,45 140,40 150,45 130,50" fill="#22c55e" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<polygon points="120,45 130,50 130,60 120,55" fill="#16a34a" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
<polygon points="130,50 150,45 150,55 130,60" fill="#15803d" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>

</svg>