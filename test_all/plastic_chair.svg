<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">

<!-- Drop Shadow -->
<polygon points="30,130 90,120 110,140 50,150" fill="#cbd5e1" opacity="0.6"/>
<!-- Back Legs -->
<rect x="35" y="80" width="8" height="50" fill="#3b82f6" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="85" y="75" width="8" height="50" fill="#3b82f6" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Seat Base -->
<polygon points="25,85 85,75 105,95 45,105" fill="#60a5fa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Seat Front Edge -->
<polygon points="25,85 45,105 45,110 25,90" fill="#2563eb" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Seat Side Edge -->
<polygon points="45,105 105,95 105,100 45,110" fill="#2563eb" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Front Legs -->
<rect x="35" y="100" width="8" height="50" fill="#60a5fa" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="90" y="90" width="8" height="50" fill="#60a5fa" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Backrest Frame -->
<polygon points="30,80 30,20 85,15 85,75" fill="none" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="30,20 85,15 85,20 30,25" fill="#3b82f6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Backrest Slats -->
<polygon points="30,35 85,30 85,40 30,45" fill="#60a5fa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="30,55 85,50 85,60 30,65" fill="#60a5fa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>

</svg>