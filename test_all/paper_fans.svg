<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">

<!-- Drop Shadow -->
<ellipse cx="80" cy="145" rx="50" ry="10" fill="#cbd5e1" opacity="0.6"/>
<!-- Fan 1 (Back left) -->
<path d="M 40,80 L 10,40 A 50 50 0 0 1 80,20 Z" fill="#fde047" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<path d="M 40,80 L 25,30 M 40,80 L 45,22 M 40,80 L 65,20" stroke="#1e293b" stroke-width="2"/>
<circle cx="40" cy="80" r="8" fill="#fef08a" stroke="#1e293b" stroke-width="4"/>
<!-- Fan 2 (Back right) -->
<path d="M 110,70 L 150,40 A 50 50 0 0 0 80,20 Z" fill="#60a5fa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<path d="M 110,70 L 130,25 M 110,70 L 110,18 M 110,70 L 85,20" stroke="#1e293b" stroke-width="2"/>
<circle cx="110" cy="70" r="8" fill="#93c5fd" stroke="#1e293b" stroke-width="4"/>
<!-- Fan 3 (Front Center - Fully open) -->
<circle cx="80" cy="100" r="40" fill="#f472b6" stroke="#1e293b" stroke-width="4"/>
<!-- Fold lines -->
<path d="M 80,100 L 80,60 M 80,100 L 108,72 M 80,100 L 120,100 M 80,100 L 108,128 M 80,100 L 80,140 M 80,100 L 52,128 M 80,100 L 40,100 M 80,100 L 52,72" stroke="#1e293b" stroke-width="2"/>
<!-- Inner detail -->
<circle cx="80" cy="100" r="12" fill="#fbcfe8" stroke="#1e293b" stroke-width="4"/>

</svg>