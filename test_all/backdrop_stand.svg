<path d="M 45,22 Q 55,80 45,133" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
<path d="M 65,22 Q 75,80 65,130" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
<path d="M 85,22 Q 95,80 85,127" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
<path d="M 105,22 Q 115,80 105,124" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>

</svg>