<polygon points="20,165 140,150 150,160 30,175" fill="#cbd5e1" opacity="0.6"/>
<!-- Left Stand Base -->
<polygon points="20,150 40,145 45,155 25,160" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Right Stand Base -->
<polygon points="120,135 140,130 145,140 125,145" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Left Pole -->
<polygon points="30,20 35,20 37,150 32,150" fill="#e2e8f0" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Right Pole -->
<polygon points="130,20 135,20 137,135 132,135" fill="#e2e8f0" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Top Crossbar -->
<polygon points="25,15 140,15 140,22 25,22" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Backdrop Curtain (Hanging) -->
