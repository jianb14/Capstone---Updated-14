<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140">

<!-- Drop Shadow -->
<ellipse cx="70" cy="125" rx="35" ry="8" fill="#cbd5e1" opacity="0.6"/>
<!-- Base -->
<ellipse cx="70" cy="115" rx="40" ry="12" fill="#e2e8f0" stroke="#1e293b" stroke-width="4"/>
<path d="M 30,115 A 40 12 0 0 0 110,115 L 110,120 A 40 12 0 0 1 30,120 Z" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Stand Pole -->
<rect x="65" y="80" width="10" height="35" fill="#f8fafc" stroke="#1e293b" stroke-width="4"/>
<!-- Front Face (Black Plate) -->
<rect x="20" y="20" width="100" height="70" rx="5" fill="#1e1e1e" stroke="#1e293b" stroke-width="4"/>
<!-- Extrusion / Metal Casing (Isometric effect via translation) -->
<path d="M 120,25 L 130,35 L 130,105 L 120,90 Z" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<path d="M 25,20 L 35,10 L 135,10 L 125,20 Z" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Neon Text with Double Glow Effect -->
<text x="70" y="75" text-anchor="middle" font-size="55" font-family="Arial Black,sans-serif" font-weight="900" fill="#fef08a" filter="url(#glow)">18</text>
<text x="70" y="75" text-anchor="middle" font-size="55" font-family="Arial Black,sans-serif" font-weight="900" fill="#fbbf24" stroke="#fff" stroke-width="2">18</text>
<!-- Marquee Bulbs -->
<circle cx="35" cy="35" r="3" fill="#fff" stroke="#1e293b" stroke-width="1.5"/>
<circle cx="105" cy="35" r="3" fill="#fff" stroke="#1e293b" stroke-width="1.5"/>
<circle cx="35" cy="75" r="3" fill="#fff" stroke="#1e293b" stroke-width="1.5"/>
<circle cx="105" cy="75" r="3" fill="#fff" stroke="#1e293b" stroke-width="1.5"/>

</svg>