<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">

<!-- Drop Shadow -->
<polygon points="30,120 150,90 180,110 60,140" fill="#cbd5e1" opacity="0.6"/>
<!-- Table Legs -->
<rect x="40" y="70" width="8" height="60" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="140" y="55" width="8" height="50" fill="#94a3b8" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="75" y="80" width="8" height="55" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="165" y="65" width="8" height="45" fill="#cbd5e1" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Tablecloth Drape/Extrusion -->
<polygon points="20,60 150,30 150,45 20,75" fill="#e2e8f0" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="150,30 180,50 180,65 150,45" fill="#cbd5e1" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Tabletop Surface -->
<polygon points="20,60 150,30 180,50 50,80" fill="#f8fafc" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>

</svg>