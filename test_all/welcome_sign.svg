<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160">

<!-- Drop Shadow -->
<ellipse cx="70" cy="145" rx="30" ry="8" fill="#cbd5e1" opacity="0.6"/>
<!-- Easel Back Leg -->
<line x1="70" y1="50" x2="70" y2="140" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
<!-- Easel Front Legs -->
<polygon points="65,40 50,140 58,140 70,40" fill="#fbbf24" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="75,40 90,140 82,140 70,40" fill="#fbbf24" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Sign Board Frame Extrusion -->
<polygon points="15,30 115,20 115,85 15,95" fill="#eab308" stroke="#1e293b" stroke-width="4"/>
<!-- Sign Board Front Face -->
<polygon points="20,40 120,30 120,95 20,105" fill="#fef3c7" stroke="#1e293b" stroke-width="4"/>
<!-- Easel Pegs/Rest -->
<polygon points="10,95 130,85 130,90 10,100" fill="#d97706" stroke="#1e293b" stroke-width="4"/>
<!-- Sign Text Decoration -->
<text x="70" y="65" text-anchor="middle" font-size="14" font-family="Arial,sans-serif" font-weight="bold" fill="#1e293b" transform="rotate(-5 70 65)">Welcome</text>
<text x="70" y="80" text-anchor="middle" font-size="9" font-family="Arial,sans-serif" fill="#64748b" transform="rotate(-5 70 80)">to our Party!</text>
<!-- Floral Decor Corner -->
<circle cx="25" cy="45" r="8" fill="#ec4899" stroke="#1e293b" stroke-width="2"/>
<circle cx="35" cy="40" r="6" fill="#f472b6" stroke="#1e293b" stroke-width="2"/>
<path d="M 30,55 L 40,65 M 35,45 L 45,45 M 15,35 L 5,30" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>

</svg>