<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">

<!-- Drop Shadow -->
<polygon points="30,130 150,100 180,120 60,150" fill="#cbd5e1" opacity="0.6"/>
<!-- Skirt/Drape (Pink) -->
<polygon points="25,65 155,35 155,100 25,130" fill="#fbcfe8" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="155,35 185,55 185,110 155,90" fill="#f9a8d4" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Tabletop Extrusion -->
<polygon points="20,60 150,30 150,35 20,65" fill="#f472b6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="150,30 180,50 180,55 150,35" fill="#ec4899" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Tabletop Surface -->
<polygon points="20,60 150,30 180,50 50,80" fill="#fce7f3" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Skirt Ruffles -->
<path d="M 35,62 L 35,128" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<path d="M 55,57 L 55,123" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<path d="M 75,52 L 75,118" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<path d="M 95,48 L 95,114" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<path d="M 115,43 L 115,109" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<path d="M 135,38 L 135,104" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
<!-- Props on table -->
<ellipse cx="65" cy="62" rx="15" ry="5" fill="#fbbf24" stroke="#1e293b" stroke-width="2"/>
<rect x="58" y="50" width="14" height="10" rx="2" fill="#38bdf8" stroke="#1e293b" stroke-width="2"/>
<circle cx="65" cy="46" r="4" fill="#ef4444" stroke="#1e293b" stroke-width="1.5"/>

</svg>