<rect x="105" y="75" width="8" height="25" fill="#5b21b6" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<!-- Base -->
<polygon points="20,95 100,75 130,95 40,115" fill="#c4b5fd" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="40,115 130,95 130,105 40,125" fill="#8b5cf6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="20,95 40,115 40,125 20,105" fill="#a78bfa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Backrest -->
<polygon points="30,75 110,55 110,15 30,35" fill="#c4b5fd" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="30,35 110,15 100,10 20,30" fill="#a78bfa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="20,30 30,35 30,75 20,70" fill="#8b5cf6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<!-- Armrests -->
<polygon points="10,65 40,55 45,95 15,105" fill="#a78bfa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="10,65 40,55 35,50 5,60" fill="#c4b5fd" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="5,60 10,65 15,105 10,100" fill="#8b5cf6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>

<polygon points="95,45 125,35 130,75 100,85" fill="#a78bfa" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="95,45 125,35 120,30 90,40" fill="#c4b5fd" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
<polygon points="120,30 125,35 130,75 125,70" fill="#8b5cf6" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>

<!-- Front Legs -->
<rect x="30" y="110" width="8" height="25" fill="#0f172a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>
<rect x="110" y="90" width="8" height="25" fill="#0f172a" stroke="#1e293b" stroke-width="3" stroke-linejoin="round"/>

